# ToolGuard Chain Configuration — Demo Failing Chain
# This demonstrates a financial tool chain with a hidden null bug.
# Run with: toolguard test --chain demo_chain.yaml

chain:
  name: "Stock Risk Pipeline"
  description: "Fetch stock price → Calculate position → Generate risk alert"

tools:
  - name: "fetch_stock_price"
    module: "tools"
    function: "fetch_stock_price"

  - name: "calculate_position"
    module: "tools"
    function: "calculate_position"

  - name: "generate_risk_alert"
    module: "tools"
    function: "generate_risk_alert"

test_config:
  test_cases:
    - happy_path
    - null_handling
    - malformed_data
    - missing_fields
    - type_mismatch
  iterations: 10
  reliability_threshold: 0.90

base_input:
  ticker: "AAPL"
  exchange: "NYSE"
